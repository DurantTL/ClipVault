name: Release SlateBox

# Cutting a release: push a tag like v1.0.0. This builds a Release .app,
# signs and notarizes it when the Apple secrets below are configured in the
# repository settings (otherwise it produces an unsigned DMG for testing),
# packages a DMG, and publishes a GitHub Release with the DMG attached.
#
# Optional repository secrets for signing + notarization:
#   MACOS_CERTIFICATE_BASE64      Developer ID Application .p12, base64-encoded
#   MACOS_CERTIFICATE_PASSWORD    password for the .p12
#   APPLE_ID                      Apple ID email used for notarization
#   APPLE_TEAM_ID                 Apple Developer team ID
#   APPLE_APP_SPECIFIC_PASSWORD   app-specific password for notarytool

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build, package, and publish
    runs-on: macos-latest
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing version $VERSION"

      - name: Generate icons
        run: |
          if [ -f Scripts/generate_app_icon.py ]; then
            python3 Scripts/generate_app_icon.py
          fi

      - name: Build Release app
        run: |
          xcodebuild \
            -project SlateBox.xcodeproj \
            -scheme SlateBox \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            build
          APP_PATH="build/Build/Products/Release/SlateBox.app"
          test -d "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          xcodebuild \
            -project SlateBox.xcodeproj \
            -scheme SlateBox \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          KEYCHAIN_PATH="$RUNNER_TEMP/release.keychain-db"
          echo "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          rm "$RUNNER_TEMP/certificate.p12"

      - name: Sign app (Developer ID, hardened runtime)
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements ClipVault/ClipVault.entitlements \
            --sign "Developer ID Application" \
            "$APP_PATH"
          codesign --verify --strict --verbose=2 "$APP_PATH"

      - name: Create DMG
        run: |
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          DMG_NAME="SlateBox-$VERSION.dmg"
          hdiutil create -volname "SlateBox $VERSION" -srcfolder "$STAGING" -ov -format UDZO "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        if: env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != ''
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_NAME"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$MACOS_CERTIFICATE_BASE64" ]; then
            SIGNING_NOTE="This build is Developer ID signed."
          else
            SIGNING_NOTE="This build is unsigned (signing secrets not configured). To open it, right-click the app and choose Open the first time."
          fi
          if [ -n "$APPLE_ID" ]; then
            SIGNING_NOTE="$SIGNING_NOTE Notarized and stapled."
          fi
          gh release create "$GITHUB_REF_NAME" "$DMG_NAME" \
            --title "SlateBox $VERSION" \
            --generate-notes \
            --notes "$SIGNING_NOTE"
