name: Build SlateBox

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build SlateBox macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Generate icons if script exists
        run: |
          if [ -f Scripts/generate_app_icon.py ]; then
            python3 Scripts/generate_app_icon.py
          fi

      - name: List schemes
        run: |
          xcodebuild -list -project SlateBox.xcodeproj

      - name: Build
        run: |
          set +e
          xcodebuild \
            -project SlateBox.xcodeproj \
            -scheme SlateBox \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build > build.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            {
              echo "--- Xcode build errors ---"
              grep -nE 'error:|fatal error:' build.log || true
              echo "--- Build log tail ---"
              tail -120 build.log
            } > build-errors.txt
            cat build-errors.txt
            exit $status
          fi

      - name: Upload build errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-errors
          path: build-errors.txt
          if-no-files-found: ignore

      - name: Test
        run: |
          set +e
          xcodebuild \
            -project SlateBox.xcodeproj \
            -scheme SlateBox \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test > test.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            {
              echo "--- Xcode test errors ---"
              grep -nE 'error:|fatal error:|failed' test.log || true
              echo "--- Test log tail ---"
              tail -120 test.log
            } > test-errors.txt
            cat test-errors.txt
            exit $status
          fi

      - name: Upload test errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-errors
          path: test-errors.txt
          if-no-files-found: ignore
