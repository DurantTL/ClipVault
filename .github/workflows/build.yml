name: Build SlateBox

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs of the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SlateBox macOS App
    # Pinned so Xcode/macOS versions only change deliberately.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Generate icons if script exists
        run: |
          if [ -f Scripts/generate_app_icon.py ]; then
            python3 Scripts/generate_app_icon.py
          fi

      - name: List schemes
        run: |
          xcodebuild -list -project SlateBox.xcodeproj

      - name: Build
        run: |
          xcodebuild \
            -project SlateBox.xcodeproj \
            -scheme SlateBox \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -project SlateBox.xcodeproj \
            -scheme SlateBox \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test
